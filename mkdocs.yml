      - Report ed estrazioni personalizzate: stat_estrazioni.md
      - Report degli incassi: stat_incassi.md
    - BeWelly — Prenotazione online: bewelly.md
  - "Automatizzare":
    - SMS & Comunicazioni automatiche: sms.md
    - WhatsApp — 3 livelli: whatsapp.md
